<div class="section-title">セッション情報</div>
<div class="section-desc">現在のセッション状態・コスト・診断を確認するコマンド。</div>
<div class="card-grid">
  <div class="card">
    <div class="card-header"><span class="cmd">/cost</span><span class="badge b-star">よく使う</span></div>
    <div class="card-desc">現セッションのトークン消費量・コストを表示。APIキー課金時は定期的に確認推奨。</div>
  </div>
  <div class="card">
    <div class="card-header"><span class="cmd">/status</span></div>
    <div class="card-desc">現在の認証方式・アカウント情報を確認。APIキーとOAuthどちらが有効かチェックできる。</div>
  </div>
  <div class="card">
    <div class="card-header"><span class="cmd">/doctor</span></div>
    <div class="card-desc">インストール状態・設定の健全性チェック。動作がおかしいときに最初に試す診断コマンド。</div>
  </div>
  <div class="card">
    <div class="card-header"><span class="cmd">/help</span></div>
    <div class="card-desc">利用可能なコマンド一覧を表示。カスタムコマンド・MCPのコマンドも含まれる。<code>/</code> を入力して続けてタイプするとフィルタリングできる。</div>
  </div>
</div>
